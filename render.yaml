services:
  - type: web
    name: student-task-manager-api
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: student-task-manager-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: student-task-manager-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: student-task-manager-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: student-task-manager-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: student-task-manager-db
    plan: free
    databaseName: student_task_manager
